<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="WTJ2wzzgYLRbkYJxvgEISxRXEXEhIDxZ3grSOEyGYgo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Password Generator</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
            button {
                margin: 10px;
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                border-radius: 3px;
            }
                button:hover {
                    background-color: #007BFF;
                    color: #fff;
                    border-radius: 3px;
                }

        .copy-feedback {
            margin-top: 10px;
            font-size: 14px;
            color: #28a745;
            display: none;
        }

       
    </style>
</head>
<body>
    <h1>Ultra Password Generator</h1>
    <hr>

    <h2><span id="password"></span></h2> 
    <button onclick="generatePassword()">Generate Password</button>
    <button onclick="copyPassword()" id="copyBtn" style="display:none;">Copy Password</button>
    <br>
    <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>
    <br>
    <script src= passwordscript.js> </script>
    <script>
        function copyPassword() {
            const passwordText = document.getElementById('password').innerText;
            if (passwordText) {
                navigator.clipboard.writeText(passwordText).then(() => {
                    const feedback = document.getElementById('copyFeedback');
                    feedback.style.display = 'block';
                    setTimeout(() => {
                        feedback.style.display = 'none';
                    }, 2000);
                }).catch(err => {
                    alert('Failed to copy password');
                });
            }
        }
    </script>

</body>
</html>
